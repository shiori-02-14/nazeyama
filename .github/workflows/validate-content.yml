name: Validate content YAML

# content/site.yaml の構文チェック + 検索用タグの HTML 反映
on:
  push:
    paths: ["content/**.yaml"]
  pull_request:
    paths: ["content/**.yaml"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install js-yaml
        run: npm init -y >/dev/null 2>&1 && npm i js-yaml >/dev/null 2>&1

      - name: Lint YAML
        run: |
          node -e '
            const fs = require("fs");
            const yaml = require("js-yaml");
            const dir = "content";
            let ok = true;
            for (const f of fs.readdirSync(dir).filter((x) => x.endsWith(".yaml"))) {
              try { yaml.load(fs.readFileSync(dir + "/" + f, "utf8")); console.log("OK  ", f); }
              catch (e) { console.error("NG  ", f, "->", e.message); ok = false; }
            }
            if (!ok) process.exit(1);
          '

      - name: Sync SEO meta to HTML
        run: node scripts/sync-seo.mjs

      - name: Commit SEO changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html books.html sitemap.xml robots.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No SEO changes."
          else
            git commit -m "chore: sync SEO from site.yaml [skip ci]"
            git push
          fi
